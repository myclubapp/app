name: PROD - Build myclub App and Deploy on Firebase Hosting
on:
  push:
    branches:
      - master
jobs:
# -------------------------------------------------------------
# Unit Tests
# -------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm i --force
      - name: Run Unit Tests
        run: npx ng test --no-watch --browsers=ChromeHeadless --code-coverage
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable
      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Karma Test Results
          path: TESTS-*.xml
          reporter: java-junit
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - name: Generate Coverage Badge
        uses: jaywcjlove/coverage-badges-cli@main
        if: always()
        with:
          source: coverage/ngv/coverage-summary.json
          output: coverage/ngv/badge.svg
      - name: Deploy Badge to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage/ngv
          destination_dir: coverage
# -------------------------------------------------------------
# myclub App
# -------------------------------------------------------------
  build_myclub:
    name: Build & Deploy Default myclub App
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
      - name: Config Node Version because of npm login issues.
        uses: actions/setup-node@master
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm i --force
      - name: Build myclub App
        run: npm run build:prod
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v12.8.0
        with:
          args: deploy --only hosting:app-myclub
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
