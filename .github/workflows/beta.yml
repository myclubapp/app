name: BETA - Build myclub App and Deploy on Firebase Hosting
on:
  push:
    branches:
      - beta
jobs:
# -------------------------------------------------------------
# Unit Tests
# -------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm ci --force
      - name: Run Unit Tests
        run: npx ng test --no-watch --browsers=ChromeHeadless --code-coverage
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Karma Test Results
          path: TESTS-*.xml
          reporter: java-junit
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
# -------------------------------------------------------------
# Beta Build
# -------------------------------------------------------------
  build_beta:
    name: Build & Deploy BETA
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
      - name: Config Node Version because of npm login issues.
        uses: actions/setup-node@master
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm i --force
      - name: Build (BETA)
        run: npm run build:beta
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting:beta
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
